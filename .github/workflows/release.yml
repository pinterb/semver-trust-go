---
# SPDX-License-Identifier: Apache-2.0
#
# Release pipeline (WS2b). Triggered by pushing a `v*` tag, or dispatched at an
# existing tag ref (so v0.1.0 can be published retroactively). Three jobs:
#
#   verify     — the dogfood gate (enforced, blocking): re-verify the release at
#                the tag's RECORDED attestation instant (never the wall clock —
#                the maintainer's temp GPG key expires 2026-08-01). The path
#                depends on the attestation predicate: a default release/v0.1 tag
#                re-derives the decision over root..TAG; a v0.10 recurring
#                release/v0.2 tag verifies the chain under the out-of-band
#                bootstrap descriptor (the BOOTSTRAP_DESCRIPTOR repo variable) and
#                confirms the descriptor binds the tag's tree. Both read the
#                instant from refs/attestations/<tag>/*.
#   goreleaser — build + publish archives, checksums, SBOMs, and keyless cosign
#                signatures via .goreleaser.yaml (needs a green verify).
#   badge      — compose the shields.io endpoint badge from verify's effective
#                trust output and force-push it to the orphan `badges` branch.
name: Release

on:
  push:
    tags:
      - 'v*'
  # workflow_dispatch reads this file from the DISPATCHED ref, and tags cut
  # before this workflow existed have no copy of it — so retro-publication
  # dispatches from main and names the tag as an input instead.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish (e.g. v0.1.0)'
        required: true
        type: string

# contents: write — create the GitHub Release and push the badges branch.
# id-token: write — cosign keyless (Fulcio/Rekor OIDC) in the goreleaser job.
permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: verify (enforced dogfood gate)
    runs-on: ubuntu-latest
    outputs:
      effective: ${{ steps.verify.outputs.effective }}
    steps:
      - name: Checkout (full history — verify walks root..TAG)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Fetch release attestation refs
        run: git fetch origin 'refs/attestations/*:refs/attestations/*'

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build semver-trust
        run: go build -o semver-trust ./cmd/semver-trust

      - name: Extract the tag's recorded attestation facts
        id: ts
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          ref=$(git for-each-ref "refs/attestations/${TAG}/*" --format='%(refname)' | head -1)
          if [ -z "${ref}" ]; then
            echo "::error::no release attestation ref under refs/attestations/${TAG}/ — run the release ceremony (docs/release-runbook.md or docs/recurring-release-runbook.md) before publishing."
            exit 1
          fi
          # The predicate type selects the verify path (default v0.1 vs the v0.10
          # recurring chain, v0.2). timestamp is the recorded instant (ADR-018).
          # effective backstops the badge for a v0.2 tag, whose at-the-head verify is
          # promotion_required and so emits no report (see the verify step).
          #
          # SECURITY: this blob is NOT yet signature/schema-verified, so every field is
          # untrusted. Never eval or shell-interpolate it — parse it as data and write
          # the step outputs via GITHUB_OUTPUT's random-delimiter format, which a hostile
          # value cannot break out of to inject extra outputs. The values are re-checked
          # downstream (predicate by the case, timestamp by verify's RFC3339 parse,
          # effective by the T0-T3 guard before it reaches the badge).
          git cat-file blob "$(git rev-parse "${ref}")" >"${RUNNER_TEMP}/attestation.json"
          python3 -c '
          import base64, json, os, secrets, sys
          ref, blob = sys.argv[1], sys.argv[2]
          p = json.loads(base64.b64decode(json.load(open(blob))["payload"]))
          pred = p["predicate"]
          out = {
              "predicate": str(p["predicateType"]),
              "timestamp": str(pred["timestamp"]),
              "effective": str((pred.get("trust") or {}).get("effective", "")),
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for k, v in out.items():
                  d = "ghd_" + secrets.token_hex(16)
                  fh.write("%s<<%s\n%s\n%s\n" % (k, d, v, d))
          print("Predicate %s; recorded instant %s (from %s)." % (out["predicate"], out["timestamp"], ref))
          ' "${ref}" "${RUNNER_TEMP}/attestation.json"

      - name: Verify this release (spec §10)
        id: verify
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          TS: ${{ steps.ts.outputs.timestamp }}
          PREDICATE: ${{ steps.ts.outputs.predicate }}
          ATT_EFFECTIVE: ${{ steps.ts.outputs.effective }}
          DESCRIPTOR: ${{ vars.BOOTSTRAP_DESCRIPTOR }}
        run: |
          set -euo pipefail
          case "${PREDICATE}" in
          https://semver-trust.dev/release/v0.1)
            # Default path (unchanged): re-derive the decision from root..TAG at the
            # recorded instant, and read the effective trust from the fresh report.
            ./semver-trust verify \
              --repo . \
              --from '' \
              --to "${TAG}" \
              --gpg-keyring .semver-trust/gpg-keyring.asc \
              --attestation-signers .semver-trust/attestation_signers \
              --verify-time "${TS}" \
              --json >verify-report.json
            effective=$(jq -r '.propagation as $p
              | (first($p.components[] | select(.name == $p.target)) // $p.components[0])
              | .effective' verify-report.json)
            ;;
          https://semver-trust.dev/release/v0.2)
            # v0.10 recurring chain. Its authenticated authority is the OUT-OF-BAND
            # bootstrap descriptor (ADR-028), supplied as a repository variable and
            # materialized OUTSIDE the checkout so the in-repo-path guard accepts it.
            if [ -z "${DESCRIPTOR}" ]; then
              echo "::error::a release/v0.2 tag needs the BOOTSTRAP_DESCRIPTOR repository variable — the out-of-band v0.10 authority (docs/recurring-release-runbook.md)."
              exit 1
            fi
            printf '%s' "${DESCRIPTOR}" >"${RUNNER_TEMP}/bootstrap-descriptor.json"
            desc="${RUNNER_TEMP}/bootstrap-descriptor.json"
            # (a) The descriptor must authentically bind THIS tag's tree: its policy and
            # trust-material digests are the committed-blob hashes. Verifying at the tag
            # alone cannot check this — the at-the-head interval aborts (promotion_required)
            # before the policy-transition step — so recompute and compare independently.
            fail=0
            want=$(jq -r '.policy_digest' "${desc}")
            got="sha256:$(git cat-file blob "${TAG}:$(jq -r '.policy_path' "${desc}")" | sha256sum | cut -d' ' -f1)"
            [ "${want}" = "${got}" ] || { echo "::error::descriptor policy_digest does not match ${TAG}'s tree."; fail=1; }
            while IFS=$'\t' read -r path dig; do
              g="sha256:$(git cat-file blob "${TAG}:${path}" | sha256sum | cut -d' ' -f1)"
              [ "${dig}" = "${g}" ] || { echo "::error::descriptor trust_material[${path}] does not match ${TAG}'s tree."; fail=1; }
            done < <(jq -r '.trust_material | to_entries[] | "\(.key)\t\(.value)"' "${desc}")
            [ "${fail}" -eq 0 ] || exit 1
            echo "Bootstrap descriptor binds ${TAG}'s tree."
            # (b) The complete chain must verify. Verifying at the head's own tag is
            # promotion_required BY DESIGN (empty interval) — but the chain reader
            # validates the whole chain genesis→head FIRST, so that specific abort means
            # "chain valid, this is the head." Any other failure is a real break.
            set +e
            out=$(./semver-trust verify --repo . --to "${TAG}" \
              --bootstrap-descriptor "${desc}" --verify-time "${TS}" 2>&1)
            rc=$?
            set -e
            printf '%s\n' "${out}"
            if [ "${rc}" -ne 0 ] && ! printf '%s' "${out}" | grep -q 'promotion_required'; then
              echo "::error::release/v0.2 chain verification failed (not the expected promotion_required-at-head)."
              exit 1
            fi
            # No interval report is emitted at the head; the badge trust is the
            # attestation's own recorded effective level.
            effective="${ATT_EFFECTIVE}"
            ;;
          *)
            echo "::error::unknown release predicate '${PREDICATE}'."
            exit 1
            ;;
          esac
          # Guard the effective level before it flows to the badge — for a v0.2 tag it
          # came from the (untrusted) attestation, so constrain it to a real level.
          case "${effective}" in
            T0|T1|T2|T3) ;;
            *) echo "::error::effective trust '${effective}' is not a valid level (T0-T3)."; exit 1 ;;
          esac
          echo "Verified at effective ${effective}."
          echo "effective=${effective}" >>"${GITHUB_OUTPUT}"

      - name: Upload verify report (for the badge job)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: verify-report
          path: verify-report.json
          # A v0.2 (v0.10 recurring) tag verifies at the head and emits no report;
          # the badge trust comes from the attestation instead. Don't fail the upload.
          if-no-files-found: ignore

  goreleaser:
    name: goreleaser (build + publish)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — changelog + VCS version stamp)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          # On dispatch, build at the named tag; on tag push this is the
          # pushed ref anyway.
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Install syft (SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Keep the worktree VCS-clean for version stamping
        # Tags cut before .gitignore knew dist/ would otherwise stamp the
        # binaries' Main.Version as "+dirty" once goreleaser writes its
        # output directory into the worktree.
        run: echo 'dist/' >>.git/info/exclude

      - name: Stage GoReleaser config (pre-config tags lack .goreleaser.yaml)
        run: |
          set -euo pipefail
          # Prefer the tag's own config; fall back to main's for tags cut
          # before the config existed. Staging outside the worktree keeps
          # git state clean for goreleaser.
          if git cat-file -e HEAD:.goreleaser.yaml 2>/dev/null; then
            git show HEAD:.goreleaser.yaml >"${RUNNER_TEMP}/goreleaser.yaml"
          else
            git show origin/main:.goreleaser.yaml >"${RUNNER_TEMP}/goreleaser.yaml"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          args: release --clean --config ${{ runner.temp }}/goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  badge:
    name: badge (publish to badges branch)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Compose badge.json
        env:
          EFFECTIVE: ${{ needs.verify.outputs.effective }}
        run: |
          set -euo pipefail
          # Badge color orders accountability (ADR-019), not pass/fail:
          # T3 green, T2 yellowgreen, T1 orange, T0 red.
          case "${EFFECTIVE}" in
            T3) color=green ;;
            T2) color=yellowgreen ;;
            T1) color=orange ;;
            *) color=red ;;
          esac
          jq -n --arg message "${EFFECTIVE} ✓" --arg color "${color}" \
            '{schemaVersion: 1, label: "SemVer-Trust", message: $message, color: $color}' \
            >"${RUNNER_TEMP}/badge.json"

      - name: Publish to the badges branch
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |-
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout --orphan badges
          git rm -rf --quiet .
          cp "${RUNNER_TEMP}/badge.json" badge.json
          git add badge.json
          git commit -m "badge: ${TAG}"
          git push --force origin badges
